{% extends 'base.html' %}{% block content %}<h1>Attendance Records</h1><form class="search"><input name="q" placeholder="Search by member, event, session..." value="{{ q }}"><button class="btn">Search</button></form><div class="card scroll"><table class="wide"><tr><th>Member</th><th>Phone</th><th>Event</th><th>Session</th><th>Date</th></tr>{% for r in rows %}<tr><td>{{ r.full_name_en }}</td><td>{{ r.phone or '' }}</td><td>{{ r.event_name }}</td><td>{{ r.session_name or 'Full event' }}</td><td>{{ r.session_date or r.event_date or '' }}</td></tr>{% endfor %}</table></div>{% endblock %}
