{% extends 'base.html' %}{% block content %}<h1>{{ 'Edit Event' if event else 'Add Event' }}</h1><form method="post" class="card"><div class="form-grid"><div class="full"><label>Event Name</label><input name="name" required value="{{ event.name if event else '' }}"></div><div><label>Date</label><input type="date" name="event_date" value="{{ event.event_date if event else '' }}"></div><div><label>Location</label><input name="location" value="{{ event.location if event else '' }}"></div><div><label>Type</label><input name="event_type" value="{{ event.event_type if event else '' }}"></div><div class="full"><label>Notes</label><textarea name="notes">{{ event.notes if event else '' }}</textarea></div></div><br><button class="btn">Save</button> <a class="btn secondary" href="{{ url_for('events') }}">Cancel</a></form>{% endblock %}
